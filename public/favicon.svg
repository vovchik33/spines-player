<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300" role="img" aria-label="Spine Player">
  <defs>
    <symbol id="rounded-spine-bone" viewBox="-20 -20 160 40">
      <path
        d="M 0 -15
           L 120 0
           L 0 15
           A 15 15 0 1 1 0 -15
           Z"
        fill="#7B61FF"
        fill-opacity="0.8"
        stroke="white"
        stroke-width="3"
        stroke-linejoin="round"
      />
      <circle cx="0" cy="0" r="3" fill="white" />
    </symbol>
  </defs>

  <g transform="translate(70, 150) scale(1.9, -1.9)">
    <g transform="translate(0, -60) rotate(90)">
      <use href="#rounded-spine-bone" width="140" height="40" x="-10" y="-20" />
    </g>

    <g transform="translate(0, 60) rotate(-30)">
      <use href="#rounded-spine-bone" width="140" height="40" x="-10" y="-20" />
    </g>

    <g transform="translate(103.9, 0) rotate(-150)">
      <use href="#rounded-spine-bone" width="140" height="40" x="-10" y="-20" />
    </g>
  </g>
</svg>